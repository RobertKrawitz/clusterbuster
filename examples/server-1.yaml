# Exchange data at 10 MB/sec with a total of 2 GB per client,
# with 5 deployments in 2 namespaces each of which uses 4 replica clients
# and 3 containers.  You wish to place the clients on nodes other than the
# servers
options:
  precleanup: true
  cleanup: true
  workload: server
  namespaces: 1
  deployments: 10
  replicas: 4
  containers: 3
  antiaffinity: true
  #targetdatarate: 10MB
  workloadruntime: 20
  exit-at-end: true
