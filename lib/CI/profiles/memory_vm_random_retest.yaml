# Single job: memory VM random scan with 8×4 replicas (fits smaller clusters).
# ./run-perf-ci-suite --profile=memory_vm_random_retest
---
version: 1
name: memory_vm_random_retest

options:
  force-pull: 1
  job_runtime: 60
  workloads: memory
  runtimeclasses: vm
  memory-timeout: 7200
  "vm-cores:memory": 4
  "vm-memory:memory": 16Gi
  memory-params:
    - "120:8:4:256Mi:random"
  artifactdir: ""
  virtiofsd-direct: 1
  use-python-venv: 1
  cleanup: 1
  restart: 0
  deployment-type: replicaset
