# ClusterBuster functional CI profile
# ~64GiB / 32 CPU workers; ~1 hour.
---
version: 1
name: func_ci
description: >
  ClusterBuster functional CI profile (~64GiB / 32 CPU workers; ~1 hour).

options:
  force-pull: 1

  files-params:
    - "1:64:64:4096:4096:0"
    - "1:64:64:65536:262144:1"
  files-timeout: 1800

  job_runtime: 60

  fio-fdatasync: 0
  fio-patterns: "read,write,randread,randwrite"
  fio-iodepths: 1
  fio-ioengines: libaio
  fio-ninst: 1
  fio-absolute-filesize: 32Gi
  fio-timeout: 3600
  fio-memsize: 4096

  uperf-msg-sizes: "64,8192"
  uperf-nthr: 1
  uperf-ninst: 1
  uperf-timeout: 300

  cpusoaker-timeout: 300
  cpusoaker-replica-increment: 10
  cpusoaker-max-replicas: 30

  memory-timeout: 1800
  "vm-cores:memory": 2
  "vm-memory:memory": 4Gi
  memory-params:
    - "60:1:1:128Mi:1"
    - "90:2:2:256Mi:1"
    - "60:4:2:128Mi:random"

  hammerdb-timeout: 600
  "timeout:hammerdb:vm": 1200
  hammerdb-params:
    - "120:pg:2:1:4:tpcc"
    - "120:mariadb:2:1:4:tpcc"
  "limit:hammerdb":
    - "memory=7Gi"
    - "cpu=4"
  "vm-cores:hammerdb": 5
  "vm-memory:hammerdb": 8Gi

  artifactdir: ""
  virtiofsd-direct: 1
  use-python-venv: 1
  cleanup: 1
  restart: 0
  deployment-type: replicaset

  "volume:files,fio:!vm": ":emptydir:/var/opt/clusterbuster"
  "volume:files:vm": "emptydisk:/var/opt/clusterbuster:size=auto:inodes=auto"
  "volume:fio:vm": "emptydisk:/var/opt/clusterbuster:size=auto"
