# ClusterBuster smoke test profile — soft ~15 min for PR pre-checks; ~64GiB workers.
---
version: 1
name: test_ci

options:
  workloads: "files,fio,uperf,cpusoaker,memory"
  force-pull: 1

  files-params:
    - "1:32:32:4096:4096:0"
  files-timeout: 1800

  job_runtime: 40

  fio-fdatasync: 0
  fio-patterns: read
  fio-iodepths: 1
  fio-ioengines: libaio
  fio-ninst: 1
  fio-absolute-filesize: 2Gi
  fio-timeout: 3600
  fio-memsize: 4096
  fio-blocksize: 1048576

  uperf_runtime: 30
  uperf-msg-sizes: 8192
  uperf-nthr: 1
  uperf-ninst: 1
  uperf-timeout: 300

  cpusoaker-timeout: 300
  cpusoaker-replica-increment: 10
  cpusoaker-max-replicas: 10

  memory-timeout: 900
  memory-params:
    - "25:1:1:64Mi:1"
    - "25:1:1:64Mi:random"
    - "25:4:2:128Mi:1"

  artifactdir: ""
  virtiofsd-direct: 1
  use-python-venv: 1
  cleanup: 1
  restart: 0
  deployment-type: replicaset

  "volume:files,fio:pod,kata": "emptydir:/var/opt/clusterbuster"
  "volume:files:vm": "emptydisk:/var/opt/clusterbuster:fstype=ext4:size=auto:inodes=auto"
  "volume:fio:vm": "emptydisk:/var/opt/clusterbuster:size=auto"
